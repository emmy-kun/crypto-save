<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallet - Crypto Save</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- TOP NAV -->
  <div class="top-nav">

    <div class="nav-left">
      <img src="/cryptosave2.png" alt="logo" class="site-logo" />
    </div>

    <div class="top-links" id="navLinks">
      <a href="dashboard.html" class="nav-link" id="nav-dashboard">Dashboard</a>
      <a href="wallet.html" class="nav-link" id="nav-wallet">Wallet</a>
      <a href="transactions.html" class="nav-link" id="nav-transactions">Transactions</a>
    </div>

    <div class="nav-right">
      <div class="user" onclick="logout()">Logout</div>
      <div class="hamburger" id="hamburger">☰</div>
    </div>

  </div>

  <!-- MAIN -->
  <div class="container">

    <div class="left">

      <div class="wallet-card">

        <p>Total Wallet Balance</p>

        <div class="balance-row">
          <div class="big" id="walletTotal">$0.00</div>

          <span id="toggleBalance" class="eye-btn">

            <svg id="eyeOpen" width="20" height="20" fill="white" viewBox="0 0 24 24">
              <path d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7z" />
              <circle cx="12" cy="12" r="2.5" />
            </svg>

            <svg id="eyeClosed" width="20" height="20" fill="white" viewBox="0 0 24 24" style="display:none;">
              <path d="M2 4l20 20-1.5 1.5-3.1-3.1A10.8 10.8 0 0112 19C5 19 2 12 2 12z" />
            </svg>

          </span>
        </div>

        <div class="action-buttons">
          <button class="deposit-btn" onclick="openDeposit()">Deposit</button>
          <button class="withdraw-btn" onclick="openWithdraw()">Withdraw</button>
        </div>

      </div>

      <div class="section-title">Your Assets</div>

      <div class="wallet-summary">
        <div class="summary-card">
          <p>Total Assets</p>
          <h2 id="assetCount">0</h2>
        </div>
      </div>

      <div id="walletAssets"></div>

    </div>

  </div>

  <!-- WITHDRAW MODAL -->
  <div id="withdrawModal" class="modal">
    <div class="modal-box">

      <div class="modal-header">
        <h3>Withdraw</h3>
        <span onclick="closeWithdraw()">×</span>
      </div>

      <div class="modal-body">

        <label>Coin</label>
        <select id="withdrawCoin">
          <option value="bitcoin">Bitcoin (BTC)</option>
          <option value="ethereum">Ethereum (ETH)</option>
          <option value="usdt">Tether (USDT)</option>
          <option value="usdc">USD Coin (USDC)</option>
          <option value="binancecoin">BNB (BNB)</option>
          <option value="solana">Solana (SOL)</option>
          <option value="xrp">XRP (XRP)</option>
          <option value="cardano">Cardano (ADA)</option>
          <option value="dogecoin">Dogecoin (DOGE)</option>
          <option value="tron">TRON (TRX)</option>
          <option value="polkadot">Polkadot (DOT)</option>
          <option value="litecoin">Litecoin (LTC)</option>
          <option value="chainlink">Chainlink (LINK)</option>
          <option value="avalanche">Avalanche (AVAX)</option>
          <option value="polygon">Polygon (MATIC)</option>
          <option value="stellar">Stellar (XLM)</option>
          <option value="cosmos">Cosmos (ATOM)</option>
          <option value="monero">Monero (XMR)</option>
          <option value="bitcoin-cash">Bitcoin Cash (BCH)</option>
          <option value="aptos">Aptos (APT)</option>
        </select>

        <label>Wallet Address</label>
        <input type="text" id="withdrawAddress" placeholder="Enter wallet address">

        <label>Amount</label>
        <input type="number" id="withdrawAmount" placeholder="Enter amount">

      </div>

      <div class="modal-footer">
        <button class="primary-btn" onclick="submitWithdraw()">Withdraw</button>
      </div>

    </div>
  </div>

  <div id="depositModal" class="modal">
    <div class="modal-box">

      <div class="modal-header">
        <h3>Deposit</h3>
        <span onclick="closeDeposit()">×</span>
      </div>

      <div class="modal-body">
        <p class="hint-text">USDT (TRC20) Deposit Address</p>


        <div class="address-row">
          <input id="depositWalletAddress" class="wallet-address-box" readonly value="Loading..." />

          <div class="copy-icon" onclick="copyDepositAddress()">
            📋
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="wallet.js"></script>
</body>

</html>
