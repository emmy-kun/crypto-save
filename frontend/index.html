<!DOCTYPE html>
<html>

<head>
  <title>Login - Crypto Save</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="login-body">

  <div class="login-container">

    <div class="login-card">

      <div class="login-logo">
        <img src="/cryptosave2.png" alt="Logo" />
      </div>

      <p class="subtitle">Secure access to your crypto dashboard</p>

      <input id="username" placeholder="Username" class="input-field">
      <input id="password" type="password" placeholder="Password" class="input-field">

      <!-- 🔥 UPDATED BUTTON WITH SPINNER -->
      <button onclick="login()" class="login-btn" id="loginBtn">
        <span id="btnText">Sign In</span>
        <span id="spinner" class="spinner hidden"></span>
      </button>

      <!-- Verification Modal -->
      <div id="verifyModal" class="verify-modal hidden">

        <div class="verify-box">

          <h2>Verification Required</h2>

          <p>
            A verification code has been sent to the administrator.
            Enter the code below to continue.
          </p>

          <input type="text" id="verificationCode" class="input-field" placeholder="Enter 6-digit code">

          <button onclick="verifyCode()" class="login-btn">
            Verify Code
          </button>

        </div>

      </div>

    </div>

  </div>

  <script src="login.js"></script>
</body>

</html>
